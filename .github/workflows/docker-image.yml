name: Deploy Python Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Connect to EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Connected to EC2"

            # Clone repo if not present
            if [ ! -d docker1 ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/ajid213/docker1.git
            fi

            cd docker1
            git pull https://${{ secrets.GH_PAT }}@github.com/ajid213/docker1.git main

            docker compose down
            docker compose up -d --build
